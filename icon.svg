<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#173a72"/>
      <stop offset="1" stop-color="#13a0a6"/>
    </linearGradient>
  </defs>

  <!-- full-bleed background -->
  <rect width="256" height="256" fill="url(#bg2)"/>

  <!-- circuit traces (corners) -->
  <g stroke="#74d6e8" stroke-width="2.4" fill="none" opacity="0.45" stroke-linecap="round">
    <path d="M256 40 H214 L196 58 M214 40 V18"/>
    <path d="M256 92 H188 L172 76"/>
    <path d="M0 196 H44 L62 178 M44 196 V226"/>
    <path d="M0 150 H60 L74 164"/>
  </g>
  <g fill="#9fe7ff" opacity="0.7">
    <circle cx="214" cy="40" r="3.2"/><circle cx="188" cy="92" r="3.2"/>
    <circle cx="44" cy="196" r="3.2"/><circle cx="60" cy="150" r="3.2"/>
  </g>

  <!-- crosshair -->
  <g stroke="#bdeeff" fill="none" stroke-linecap="round">
    <circle cx="130" cy="138" r="74" stroke-width="9" opacity="0.25"/>
    <circle cx="130" cy="138" r="74" stroke-width="5"/>
    <g stroke-width="6">
      <line x1="130" y1="50" x2="130" y2="80"/>
      <line x1="130" y1="196" x2="130" y2="226"/>
      <line x1="42" y1="138" x2="72" y2="138"/>
      <line x1="188" y1="138" x2="218" y2="138"/>
    </g>
  </g>

  <!-- zap sparks around the bug -->
  <g stroke="#ffd23f" stroke-width="4" stroke-linecap="round" opacity="0.9">
    <line x1="92" y1="96" x2="80" y2="84"/>
    <line x1="176" y1="104" x2="190" y2="96"/>
    <line x1="88" y1="172" x2="74" y2="182"/>
    <line x1="178" y1="172" x2="192" y2="184"/>
    <line x1="132" y1="200" x2="132" y2="216"/>
  </g>

  <!-- ladybug -->
  <g transform="rotate(18 132 142)">
    <!-- legs -->
    <g stroke="#10151c" stroke-width="6" stroke-linecap="round">
      <line x1="104" y1="120" x2="84" y2="106"/>
      <line x1="100" y1="142" x2="78" y2="142"/>
      <line x1="104" y1="164" x2="84" y2="178"/>
      <line x1="160" y1="120" x2="180" y2="106"/>
      <line x1="164" y1="142" x2="186" y2="142"/>
      <line x1="160" y1="164" x2="180" y2="178"/>
    </g>
    <!-- body -->
    <ellipse cx="132" cy="146" rx="46" ry="52" fill="#e0492b" stroke="#10151c" stroke-width="5"/>
    <!-- center split -->
    <line x1="132" y1="98" x2="132" y2="196" stroke="#10151c" stroke-width="5"/>
    <!-- head -->
    <ellipse cx="132" cy="100" rx="26" ry="20" fill="#16202b"/>
    <circle cx="123" cy="98" r="4.5" fill="#e9eef3"/>
    <circle cx="141" cy="98" r="4.5" fill="#e9eef3"/>
    <!-- spots -->
    <g fill="#16202b">
      <circle cx="112" cy="132" r="9"/><circle cx="152" cy="132" r="9"/>
      <circle cx="108" cy="166" r="8"/><circle cx="156" cy="166" r="8"/>
      <circle cx="124" cy="182" r="6"/><circle cx="140" cy="182" r="6"/>
    </g>
  </g>

  <!-- lightning bolt striking from top-left -->
  <polygon points="58,16 96,16 78,74 110,70 70,150 84,92 52,96"
           fill="#ffd23f" stroke="#c9971b" stroke-width="3" stroke-linejoin="round"/>
</svg>
