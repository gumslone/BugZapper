name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Headless Linux needs a virtual X server for the Tk smoke test; without
      # it that test simply skips (the rest still run).
      - name: Install xvfb (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Run tests (Linux, headless)
        if: runner.os == 'Linux'
        run: xvfb-run -a python -m unittest discover -s tests -p 'test_*.py' -v

      - name: Run tests (macOS / Windows)
        if: runner.os != 'Linux'
        run: python -m unittest discover -s tests -p "test_*.py" -v
